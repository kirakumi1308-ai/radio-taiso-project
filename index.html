<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚄 新幹線100駅の旅 - 乗車報告</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="nav-links">
    <a href="index.html" class="nav-link active">🚄 乗車報告</a>
    <a href="map.html" class="nav-link">🗾 全国の旅</a>
  </div>

  <div class="card registration-container">
    <h2>🚄 今日の乗車報告</h2>
    
    <!-- YouTube -->
    <a href="https://youtu.be/q91wVnUGcnk?si=8mDKoE7orh-Qt9CY" target="_blank" class="youtube-btn">
      🔔 出発のベルを鳴らす（YouTube）
    </a>

    <!-- ドクターイエロー通知 -->
    <div id="doctor-yellow-alert" style="display:none;" class="doctor-yellow-alert">
      🌟 ドクターイエローが通過！ 2駅進みました！
    </div>

    <!-- 統計表示 -->
    <div id="my-stats">
      <div class="my-name" id="my-stats-name">あなたの累計</div>
      <div class="my-km" id="my-stats-km">0 km</div>
      <div class="my-count" id="my-stats-count">0駅進行</div>
    </div>

    <!-- セッションドット -->
    <div id="session-text">本日の乗車残り: 3回</div>
    <div class="session-status">
      <div class="session-dot active" id="dot-0"></div>
      <div class="session-dot active" id="dot-1"></div>
      <div class="session-dot active" id="dot-2"></div>
    </div>

    <!-- フォーム -->
    <div class="form-group">
      <label>運転手の名前 *</label>
      <input type="text" id="input-name" placeholder="例: 田中太郎" maxlength="20">
    </div>

    <div class="form-group">
      <label>一言コメント（任意）</label>
      <input type="text" id="input-comment" placeholder="例: 今日も元気よく！" maxlength="100">
    </div>

    <button class="btn-participate" id="btn-participate">🚄 乗車報告</button>

    <!-- 今日の運転手リスト -->
    <div style="margin-top:20px">
      <h2>🚄 今日の運転手</h2>
      <div id="member-list">
        <span style="color:#bbb;font-size:0.85rem;">まだ誰も乗務していません</span>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
